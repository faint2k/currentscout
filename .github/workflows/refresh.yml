name: Refresh Reddit Feed

on:
  schedule:
    # Every 15 minutes — GitHub Actions runs on Microsoft Azure IPs
    # which Reddit allows, unlike Vercel's datacenter IPs.
    # Reddit only gets called here, never from user requests.
    - cron: "*/15 * * * *"
  workflow_dispatch:
    # Also allows manual trigger from GitHub Actions UI (useful for testing)

jobs:
  refresh:
    name: Fetch Reddit & populate Redis
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Trigger feed refresh
        run: |
          RESPONSE=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/refresh")

          echo "HTTP status: $RESPONSE"
          echo "Response body:"
          cat /tmp/response.json

          # Fail the job if the endpoint returned an error
          if [ "$RESPONSE" != "200" ]; then
            echo "Refresh endpoint returned $RESPONSE — failing job"
            exit 1
          fi

          # Log key stats from the response
          TOTAL=$(cat /tmp/response.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('total_posts', 'n/a'))")
          ELAPSED=$(cat /tmp/response.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('elapsed_ms', 'n/a'))")
          echo "Posts refreshed: $TOTAL in ${ELAPSED}ms"
